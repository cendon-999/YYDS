  - RULE-SET,netflix_ip,国际媒体,no-resolve
  - RULE-SET,telegram_ip,电报消息,no-resolve
  - RULE-SET,cn_ip,国内流量,no-resolve
  
  # 兜底规则 - 未匹配流量
  - MATCH,兜底流量

